<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="32" fill="#071019"/>
  <text x="72" y="88" fill="#F4F7FA" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700">Runtime Architecture</text>
  <g font-family="Segoe UI, sans-serif">
